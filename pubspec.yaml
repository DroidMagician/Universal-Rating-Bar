name: flutter_rating_bar_universal
description: A universal Flutter rating bar with icon, SVG/PNG asset, and custom widget support — half ratings, drag gestures, animations, and read-only mode.
version: 1.0.0
homepage: https://github.com/DroidMagician/Universal-Rating-Bar
repository: https://github.com/DroidMagician/Universal-Rating-Bar
issue_tracker: https://github.com/DroidMagician/Universal-Rating-Bar/issues

topics:
  - rating
  - rating-bar
  - star-rating
  - widgets
  - svg

screenshots:
  - description: Default amber star rating with built-in half-star icon support.
    path: screenshots/default_stars.png
  - description: Interactive drag rating and read-only display mode.
    path: screenshots/interactive_demo.png
  - description: Multiple rendering modes — icons, SVG assets, emoji widgets, and vertical layout.
    path: screenshots/showcase_modes.png

environment:
  sdk: ^3.0.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
